<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOT at Knowledge 26 - Premium Preview</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        :root {
            --teal: #215052;
            --teal-dark: #183944;
            --cyan: #42C3D6;
            --orange: #F16522;
            --orange-hover: #D55417;
            --dark: #15171F;
            --off: #FAFAFA;
            --warm: #F5F3F0;
            --transition-smooth: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body, html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: var(--dark);
            color: #fff;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            scroll-behavior: smooth;
        }

        * {
            box-sizing: inherit;
        }

        /* Subtle background grain for texture */
        .noise::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.03;
            z-index: 1000;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Hover lift effects */
        .hover-lift {
            transition: var(--transition-smooth);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
        }

        /* Premium Glow Button */
        .btn-premium {
            transition: var(--transition-smooth);
            position: relative;
            overflow: hidden;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(241, 101, 34, 0.3);
        }
        .btn-premium::after {
            content: "";
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .btn-premium:hover::after {
            opacity: 1;
        }
    </style>
</head>
<body class="noise">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TEAL = "#215052";
        const TEAL_DARK = "#183944";
        const CYAN = "#42C3D6";
        const ORANGE = "#F16522";
        const DARK = "#15171F";
        const OFF = "#FAFAFA";
        const WARM = "#F5F3F0";

        function useInView(th = 0.12) {
          const ref = useRef(null);
          const [v, setV] = useState(false);
          useEffect(() => {
            const el = ref.current;
            if (!el) return;
            const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) setV(true); }, { threshold: th });
            o.observe(el);
            return () => o.disconnect();
          }, [th]);
          return [ref, v];
        }

        function FadeIn({ children, delay = 0, className = "" }) {
          const [ref, v] = useInView();
          return (
            <div ref={ref} className={className} style={{
              opacity: v ? 1 : 0, 
              transform: v ? "translateY(0)" : "translateY(24px)",
              transition: `opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${delay}s, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) ${delay}s`,
            }}>{children}</div>
          );
        }

        const NAV_ITEMS = [
          { label: "The Dinner", href: "#dinner" },
          { label: "What We Do", href: "#what" },
          { label: "ServiceNow + AI", href: "#capabilities" },
          { label: "Proof", href: "#proof" },
          { label: "RSVP", href: "#rsvp" },
        ];

        function Nav() {
          const [scrolled, setScrolled] = useState(false);
          useEffect(() => {
            const h = () => setScrolled(window.scrollY > 40);
            window.addEventListener("scroll", h);
            return () => window.removeEventListener("scroll", h);
          }, []);
          return (
            <nav style={{
              position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
              background: scrolled ? "rgba(21, 23, 31, 0.85)" : "transparent",
              backdropFilter: scrolled ? "blur(20px)" : "none",
              transition: "all 0.4s ease", padding: scrolled ? "0 24px" : "12px 24px",
              borderBottom: scrolled ? "1px solid rgba(255, 255, 255, 0.08)" : "none",
              boxShadow: scrolled ? "0 4px 30px rgba(0,0,0,0.12)" : "none",

                  <span style={{ fontSize: "13px", color: CYAN, fontWeight: 700, fontFamily: "'Plus Jakarta Sans', sans-serif", letterSpacing: "1.2px", opacity: 0.9 }}>

                        e.target.style.color = "white";

                    fontSize: "13px", fontWeight: 700, textDecoration: "none", fontFamily: "'Plus Jakarta Sans', sans-serif",
                    marginLeft: "8px", boxSizing: "border-box"
                  }}>Join Us</a>
                </div>
              </div>
            </nav>
          );
        }

        function Hero() {

                      background: "rgba(255,255,255,0.03)", borderRadius: "24px",
                      border: "1px solid rgba(255,255,255,0.08)", padding: "40px 32px",

                        WHILE WE'RE THERE

                      {[
                        { icon: "🍷", label: "Executive Dinner", detail: "Good food, good people, real talk", color: ORANGE },
                        { icon: "☕", label: "Side Meetings", detail: "1:1s across all 3 days with Manpreet", color: CYAN },
                        { icon: "📍", label: "On the Floor", detail: "Find us around the conference", color: "rgba(255,255,255,0.5)" },
                      ].map((item, i) => (

                          padding: "20px 0",
                          borderTop: i > 0 ? "1px solid rgba(255,255,255,0.06)" : "none",

                          <div>
                            <div style={{ fontFamily: "'Plus Jakarta Sans', sans-serif", fontSize: "16px", fontWeight: 700, color: "white" }}>{item.label}</div>
